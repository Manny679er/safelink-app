<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShieldScan</title>

    <style>
        body {
            font-family: Arial;
            background: #0b1220;
            color: white;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: #111827;
            padding: 20px;
            border-radius: 12px;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #38bdf8;
            border: none;
            border-radius: 8px;
            font-weight: bold;
        }

        .card {
            margin-top: 15px;
            padding: 15px;
            background: #1f2937;
            border-radius: 10px;
        }

        .safe { color: #22c55e; }
        .mid { color: #facc15; }
        .danger { color: #ef4444; }

        .small {
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🛡 ShieldScan</h1>
    <div class="subtitle">Cybersecurity Risk Intelligence Tool</div>

    <form method="POST">
        <input type="text" name="url" placeholder="Enter website URL">
        <button type="submit">Scan</button>
    </form>

    {% if result %}

    <div class="card">

        <p><b>SSL:</b> {{ result.ssl }}</p>
        <p><b>Status:</b> {{ result.status }}</p>
        <p><b>Speed:</b> {{ result.speed }}</p>
        <p><b>Server:</b> {{ result.server }}</p>

        <p class="small"><b>Threat Check:</b> {{ result.threat }}</p>

        <h2>Score: {{ result.score }}/100</h2>

        <h3 class="
            {% if result.score >= 80 %}safe
            {% elif result.score >= 50 %}mid
            {% else %}danger
            {% endif %}
        ">
            {{ result.label }}
        </h3>

    </div>

    {% endif %}

</div>

</body>
</html>
